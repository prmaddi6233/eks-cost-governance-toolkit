---
name: Feature Request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests help shape the roadmap. Describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What are you trying to accomplish that isn't well-served today?
      placeholder: "I need to track cost anomalies per team, but the current queries only show org-level..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've tried or thought about
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New query / policy / module
        - Enhancement to existing
        - Documentation
        - CI / tooling
    validations:
      required: true
