name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  markdown:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20
        with:
          globs: |
            **/*.md

  kubernetes:
    name: Validate manifests and Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Validate manifests and policies
        run: |
          kubeconform -strict -summary -ignore-missing-schemas \
            base/ policies/ cost-tracking/opencost/manifests/

      - name: Lint Helm chart
        run: helm lint helm/cost-guardrails

      - name: Render chart and validate output
        run: |
          helm template payments helm/cost-guardrails \
            -f examples/payments-team-values.yaml \
            | kubeconform -strict -summary -ignore-missing-schemas -

      - name: Validate JSON and shell scripts
        run: |
          for f in $(find . -name '*.json' -not -path './.git/*'); do
            echo "json: $f"; python3 -c "import json,sys; json.load(open('$f'))"
          done
          for s in $(find . -name '*.sh' -not -path './.git/*'); do
            echo "bash -n: $s"; bash -n "$s"
          done
