name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: warning

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Run yamllint
        run: yamllint -c .yamllint.yml . || yamllint .

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.0"

      - name: Find and lint Helm charts
        run: |
          for chart in $(find . -name "Chart.yaml" -exec dirname {} \;); do
            echo "::group::Linting $chart"
            helm lint "$chart"
            echo "::endgroup::"
          done

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  validate-kyverno:
    name: Validate Kyverno Policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kyverno CLI
        run: |
          curl -LO https://github.com/kyverno/kyverno/releases/download/v1.12.6/kyverno-cli_v1.12.6_linux_x86_64.tar.gz
          tar -xzf kyverno-cli_v1.12.6_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/

      - name: Validate policies
        run: |
          for f in $(find . -name "*.yaml" -path "*/policies/*"); do
            echo "Validating $f"
            kyverno validate "$f" || true
          done
