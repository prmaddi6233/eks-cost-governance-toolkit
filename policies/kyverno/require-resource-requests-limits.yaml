apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-requests-limits
  annotations:
    policies.kyverno.io/title: Require CPU/Memory Requests and Limits
    policies.kyverno.io/category: Cost & Governance
    policies.kyverno.io/description: >-
      Every container must declare CPU and memory requests and limits. Unbounded pods
      are the primary driver of noisy-neighbour risk and unpredictable cost on shared clusters.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "CPU and memory requests and limits are required on every container."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
