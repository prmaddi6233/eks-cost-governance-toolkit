# IRSA service account for OpenCost to read the CUR from Athena/S3.
# Attach an IAM role (via eks.amazonaws.com/role-arn) with the least-privilege
# Athena/Glue/S3 read permissions documented in docs/cost-tracking.md.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opencost
  namespace: opencost
  labels:
    app.kubernetes.io/name: opencost
    app.kubernetes.io/component: cost-tracking
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::111111111111:role/opencost-cur-access
