apiVersion: v1
kind: ResourceQuota
metadata:
  name: team-quota
  namespace: {{ include "cost-guardrails.namespace" . }}
  labels:
    {{- include "cost-guardrails.labels" . | nindent 4 }}
spec:
  hard:
    requests.cpu: {{ .Values.quota.requestsCpu | quote }}
    requests.memory: {{ .Values.quota.requestsMemory | quote }}
    limits.cpu: {{ .Values.quota.limitsCpu | quote }}
    limits.memory: {{ .Values.quota.limitsMemory | quote }}
    pods: {{ .Values.quota.pods | quote }}
    persistentvolumeclaims: {{ .Values.quota.persistentVolumeClaims | quote }}
